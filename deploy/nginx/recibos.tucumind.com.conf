server {
    listen 80;
    server_name recibos.tucumind.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name recibos.tucumind.com;

    # Reemplazar por la ubicacion real de los certificados.
    ssl_certificate /etc/letsencrypt/live/recibos.tucumind.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/recibos.tucumind.com/privkey.pem;

    root /srv/tucumind-recibos-web/apps/web/dist;
    index index.html;

    client_max_body_size 25m;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
